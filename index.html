<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 关键：禁止用户缩放，确保布局稳定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome | Yulu Ye</title>
    
    <!-- 保留原有的外部样式表 (如果它们加载很慢，建议后续也优化它们) -->
    <link rel="stylesheet" href="./style_new.css"/>
    <link rel="stylesheet" href="./style_base.css"/>

    <style>
        /* --- 全局重置 --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; /* 使用系统字体加速渲染 */
            background-color: #f5f5f5; /* 防止背景白屏 */
        }

        /* --- 背景容器 --- */
        #bkground {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            width: 100%;
            /* 添加一个柔和的背景渐变，提升质感 */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        /* --- 信息卡片 --- */
        .my-information {
            text-align: center;
            width: 100%;
            max-width: 500px; /* 限制最大宽度，更精致 */
            padding: 2.5rem 2rem;
            background: rgba(255, 255, 255, 0.85); /* 半透明白底 */
            backdrop-filter: blur(10px); /* 毛玻璃效果 */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
        }

        /* --- 头像/图标区域优化 (核心修复) --- */
        .avatar-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            /* 加载前的占位背景 */
            background: linear-gradient(135deg, #e0e0e0 0%, #f0f0f0 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 如果有 img 标签，应用以下样式 */
        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保证图片不变形 */
            opacity: 0; /* 初始隐藏 */
            transition: opacity 0.6s ease-in-out;
            display: block;
        }

        /* 图片加载完成后的类 */
        .avatar-container img.loaded {
            opacity: 1;
        }

        /* 如果没有图片，显示的默认图标 (纯CSS绘制，无需加载) */
        .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #aaa;
            background: #eee;
        }

        /* --- 文字排版 --- */
        .my-information h3 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 0.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .my-information h4 {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        .my-information h5 {
            font-size: 0.95rem;
            color: #777;
            margin-bottom: 1.5rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .my-information p {
            font-size: 1rem;
            color: #666;
            margin-bottom: 0.6rem;
            line-height: 1.6;
        }

        /* --- 按钮优化 --- */
        .enter-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 40px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(90deg, #2A3B4C 0%, #3E5266 100%); /* 使用你的主题色 */
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(42, 59, 76, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* 移除手机点击高亮 */
        }

        .enter-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(42, 59, 76, 0.2);
        }

        .enter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(42, 59, 76, 0.4);
        }

        /* --- 移动端适配 --- */
        @media (max-width: 480px) {
            #bkground {
                padding: 15px;
                align-items: center; /* 确保垂直居中 */
            }
            
            .my-information {
                padding: 2rem 1.5rem;
                width: 100%;
            }

            .avatar-container {
                width: 100px;
                height: 100px;
            }

            .my-information h3 {
                font-size: 1.6rem;
            }

            .my-information h4 {
                font-size: 1rem;
            }

            .my-information p {
                font-size: 0.9rem;
            }

            .enter-btn {
                width: 100%; /* 手机端按钮全宽，更易点击 */
                padding: 16px 0;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div id="bkground">
        <div class="my-information">
            
            <!-- 
               【重要优化】头像区域 
               1. 使用 div 包裹，方便控制占位背景
               2. 如果你有图片，取消下面 img 标签的注释，并替换 src
               3. 如果没有图片，会显示默认的 "Y" 字母占位
            -->
            <div class="avatar-container">
                <!-- 
                     操作指南：
                     1. 将你的头像压缩为 webp 格式 (推荐工具: squoosh.app)
                     2. 宽度设为 300px 即可 (不需要太大)
                     3. 放入 img 文件夹，命名为 avatar.webp
                     4. 修改下面的 src="./img/avatar.webp"
                -->
                <img src="./img/avatar.webp" 
                     alt="Yulu Ye" 
                     onload="this.classList.add('loaded')" 
                     onerror="this.style.display='none'; document.querySelector('.avatar-placeholder').style.display='flex'">
                
                <!-- 默认占位符 (图片加载失败或未提供时显示) -->
                <div class="avatar-placeholder" style="display: none;">Y</div>
            </div>

            <h3>Yulu&nbsp;Ye</h3>
            <h4>Ningbo University</h4>
            <h5>College Of Teacher Education</h5> 
            
            <p>Welcome to my personal website!</p> 
            <p>If you want to know more about me,</p>
            <p>please click below:</p> 
            
            <a href="./phfriendly.html" class="enter-btn">Enter My Portfolio</a> 
        </div>
    </div>

    <script>
        // 简单的脚本：如果图片不存在，自动显示占位符
        // 上面的 onerror 已经处理了大部分情况，这里作为双重保险
        document.addEventListener("DOMContentLoaded", function() {
            const img = document.querySelector('.avatar-container img');
            const placeholder = document.querySelector('.avatar-placeholder');
            
            if (img && !img.complete) {
                // 图片还在加载中，保持 placeholder 隐藏，等待 onload
            } else if (img && img.src && img.src.includes('avatar.webp')) {
                // 如果图片源存在但加载失败，onerror 会触发
            } else {
                // 如果没有设置 src，直接显示占位符
                if(img) img.style.display = 'none';
                if(placeholder) placeholder.style.display = 'flex';
            }
        });
    </script>
</body>
</html>
